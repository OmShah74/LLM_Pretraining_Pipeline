runtime:
  profile_name: t4_prototype_spec
  project_root: .
  artifact_dir: artifacts
  seed: 42
  device: auto
  use_mixed_precision: true
  gradient_checkpointing: false

data:
  raw_dir: artifacts/data/raw
  processed_dir: artifacts/data/processed
  tokenizer_path: artifacts/tokenizer/tokenizer.json
  tokenizer_type: byte_level_bpe
  require_real_data: true
  use_streaming_sources: true
  streaming_cache_dir: artifacts/cache/hf
  stream_sources:
    - name: fineweb_edu
      enabled: true
      role: pretrain
      path: HuggingFaceFW/fineweb-edu
      name_config: sample-10BT
      split: train
      text_field: text
      shuffle: true
      shuffle_buffer: 10000
      take: 4000
    - name: slimpajama
      enabled: true
      role: pretrain
      path: DKYoon/SlimPajama-6B
      split: train
      text_field: text
      shuffle: true
      shuffle_buffer: 10000
      take: 2000
    - name: alpaca_cleaned
      enabled: true
      role: sft
      path: ModelCloud/alpaca-data-cleaned
      split: train
      prompt_field: instruction
      response_field: output
      take: 4000
    - name: dolly_15k
      enabled: true
      role: sft
      path: databricks/databricks-dolly-15k
      split: train
      prompt_field: instruction
      response_field: response
      take: 4000
    - name: ultrafeedback_cleaned
      enabled: true
      role: dpo
      path: mlabonne/ultrafeedback-binarized-preferences-cleaned
      split: train
      prompt_field: question
      chosen_field: chosen
      rejected_field: rejected
      take: 2500
    - name: gsm8k
      enabled: true
      role: grpo
      path: openai/gsm8k
      name_config: main
      split: train
      prompt_field: question
      reference_field: answer
      take: 1000
  pretrain_filename: pretrain.jsonl
  sft_filename: sft.jsonl
  dpo_filename: dpo.jsonl
  grpo_filename: grpo.jsonl
  max_vocab_size: 256
  min_frequency: 1
  val_ratio: 0.34
  pretrain_seq_len: 32
  sft_seq_len: 48
  dpo_seq_len: 48
  min_chars: 20
  max_chars: 4000
  dedup: true
  strip_html: true
  lowercase: false
  quality_threshold: 0.35
  min_alpha_fraction: 0.6
  max_line_repeat_ratio: 0.25
  simhash_bits: 64
  simhash_bands: 4
  max_records_per_role:
    pretrain: 5000
    sft: 5000
    dpo: 2500
    grpo: 1000
  dataset_plan:
    pretrain:
      - FineWeb-Edu filtered slice
      - SlimPajama filtered slice
    sft:
      - Alpaca cleaned subset
      - Dolly cleaned subset
    dpo:
      - UltraFeedback filtered subset
    grpo:
      - verifiable prompts or curated reward prompts

model:
  vocab_size: 256
  max_seq_len: 48
  hidden_size: 96
  num_layers: 4
  mlp_hidden_size: 192
  dropout: 0.0
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  tie_embeddings: true
  attn:
    num_heads: 4
    num_kv_heads: 2
    dropout: 0.0
    rope_base: 10000
  moe:
    enabled: true
    num_experts: 4
    top_k: 2
    capacity_factor: 1.25
    aux_loss_weight: 0.01
    shared_expert: true
    expert_hidden_mult: 2.0
    expert_interval: 2

train:
  batch_size: 2
  eval_batch_size: 2
  learning_rate: 0.001
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-08
  epochs: 1
  max_steps: 4
  grad_accum_steps: 1
  grad_clip: 1.0
  log_every_steps: 1
  eval_every_steps: 2
  save_every_steps: 2
  warmup_steps: 1
  lr_scheduler: cosine
  min_lr_ratio: 0.1
  grpo_group_size: 3
  grpo_beta: 0.02
  grpo_max_new_tokens: 48
  resume_from:
